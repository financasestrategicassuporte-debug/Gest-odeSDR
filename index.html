<!-- ================================================================
     PATCH GFB v2 — Supabase + Evolution Proxy Fix (CORRIGIDO)
     Adicione este bloco ANTES do </body> no sdr-command.html
     
     FIXES v2:
     - Usa DOMContentLoaded em vez de window.onload (não quebra botões)
     - IIFE isola todas as variáveis (sem conflito com globals do HTML)
     - Guard em setStatus (sem ReferenceError se função não existir)
     - Hook seguro: aguarda o init original via evento, não override
================================================================ -->
<script>
(function() {
  'use strict';

  // ================================================================
  // CONSTANTS (isoladas no IIFE — sem conflito com o HTML original)
  // ================================================================
  var SB_URL = 'https://fdgjxqthjaxaevvgwfob.supabase.co';
  var SB_KEY = 'sb_publishable_hoaEV8xGZBQmaoH5T_Cxyg_SVlKAiVU';

  // ================================================================
  // FIX 1: evoProxy via Vercel proxy (resolve CORS definitivamente)
  // Sobrescreve no window para ser acessível pelo HTML original
  // ================================================================
  window.evoProxy = async function evoProxy(path, method, body) {
    method = method || 'GET';
    body = body || null;
    try {
      var cfg = window.config || {};
      var res = await fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          service: 'evolution',
          evolutionUrl: cfg.evolutionUrl,
          payload: { path: path, method: method, body: body },
          token: cfg.evolutionToken
        })
      });
      if (!res.ok) {
        var e = await res.json().catch(function() { return {}; });
        throw new Error(e.error || 'HTTP ' + res.status);
      }
      return res.json();
    } catch (proxyErr) {
      console.warn('[evoProxy] proxy falhou, tentando direto:', proxyErr.message);
      var cfg2 = window.config || {};
      var base = (cfg2.evolutionUrl || '').replace(/\/+$/, '');
      var opts = {
        method: method || 'GET',
        headers: { 'Content-Type': 'application/json', 'apikey': cfg2.evolutionToken }
      };
      if (body) opts.body = JSON.stringify(body);
      var r = await fetch(base + path, opts);
      if (!r.ok) throw new Error('HTTP ' + r.status + ' (direto)');
      return r.json();
    }
  };

  // ================================================================
  // FIX 2: Supabase — dados reais de ligações
  // ================================================================
  async function sbFetch(path) {
    var res = await fetch(SB_URL + '/rest/v1/' + path, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    return res.json();
  }

  function parseAIScore(analysis) {
    var m = (analysis || '').match(/Nota[^:]*:\s*(\d+)/i);
    return m ? parseInt(m[1]) : null;
  }

  // Guard seguro: só chama setStatus se existir no escopo global
  function safeSetStatus(id, ok, msg) {
    if (typeof window.setStatus === 'function') {
      window.setStatus(id, ok, msg);
    }
  }

  async function loadLigacoesData() {
    try {
      var all = await sbFetch('ligacoes?select=*&order=created_at.desc&limit=300');
      if (!Array.isArray(all)) return;

      var today = new Date().toLocaleDateString('sv-SE');
      var todayCalls = all.filter(function(c) {
        return (c.started_at || c.created_at || '').startsWith(today);
      });

      // Atualiza os 4 KPI cards
      var svs = document.querySelectorAll('.stat-card .stat-value');
      if (svs[0]) svs[0].textContent = todayCalls.length;

      var scores = all.map(function(c) { return parseAIScore(c.ai_analysis); }).filter(Boolean);
      var avgScore = scores.length ? (scores.reduce(function(a,b){return a+b;},0)/scores.length).toFixed(1) : '—';
      if (svs[1]) svs[1].textContent = avgScore;

      var meetings = todayCalls.filter(function(c) { return c.result === 'Agendou'; }).length;
      if (svs[2]) svs[2].textContent = meetings;
      if (svs[3]) svs[3].textContent = all.length;

      updateSDRsFromDB(all, todayCalls);
      updatePerfPanel(all);
      renderCallsList(all.slice(0, 10));
      renderAnalysisHistory(all.slice(0, 20));
      safeSetStatus('supabaseStatus', true, 'CONECTADO');
    } catch(e) { console.error('[loadLigacoesData]', e); }
  }

  function updateSDRsFromDB(all, todayCalls) {
    var bySDR = {};
    all.forEach(function(c) {
      var name = (c.sdr_name || 'SDR').trim();
      if (!bySDR[name]) bySDR[name] = { all:[], today:[] };
      bySDR[name].all.push(c);
    });
    todayCalls.forEach(function(c) {
      var name = (c.sdr_name || 'SDR').trim();
      if (bySDR[name]) bySDR[name].today.push(c);
    });

    var sections = document.querySelectorAll('.sidebar-section');
    var sdrSection = sections[sections.length - 1];
    if (!sdrSection || !Object.keys(bySDR).length) return;

    var cards = Object.entries(bySDR).map(function(entry) {
      var name = entry[0], data = entry[1];
      var sc = data.all.map(function(c){return parseAIScore(c.ai_analysis);}).filter(Boolean);
      var avg = sc.length ? Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length) : null;
      var agendou = data.all.filter(function(c){return c.result==='Agendou';}).length;
      var last = data.all[0];
      var lastTime = last && last.started_at ? new Date(last.started_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '—';
      var scoreClass = (avg||0) >= 7 ? 'score-high' : 'score-med';
      // Escape name para uso seguro no onclick
      var safeName = name.replace(/'/g, "\\'");
      return '<div class="sdr-card" onclick="if(window.selectSDR)selectSDR(this);if(window.patchFilterSDR)window.patchFilterSDR(\'' + safeName + '\')">'
        + '<div class="sdr-header"><div class="sdr-name">' + name + '</div>'
        + '<div class="sdr-score ' + scoreClass + '">' + (avg !== null ? avg+'/10' : '—') + '</div></div>'
        + '<div class="sdr-stats">'
        + '<div class="sdr-stat">Hoje:<span>' + data.today.length + '</span></div>'
        + '<div class="sdr-stat">Total:<span>' + data.all.length + '</span></div>'
        + '<div class="sdr-stat">Ag:<span>' + agendou + '</span></div>'
        + '</div>'
        + '<div class="sdr-status"><div class="status-indicator online"></div>'
        + '<div class="status-label">Última: ' + lastTime + '</div></div>'
        + '</div>';
    }).join('');
    sdrSection.innerHTML = '<div class="sidebar-label">SDRs — Tempo Real</div>' + cards;
  }

  function updatePerfPanel(all) {
    var perfBody = document.querySelector('#tab-dashboard .grid-2 .panel:first-child .panel-body');
    if (!perfBody) return;
    var bySDR = {};
    all.forEach(function(c) {
      var name = (c.sdr_name || 'SDR').trim();
      if (!bySDR[name]) bySDR[name] = [];
      bySDR[name].push(c);
    });
    if (!Object.keys(bySDR).length) return;
    var today = new Date().toLocaleDateString('sv-SE');
    var html = Object.entries(bySDR).map(function(entry) {
      var name = entry[0], calls = entry[1];
      var todayC = calls.filter(function(c){return (c.started_at||c.created_at||'').startsWith(today);});
      var sc = calls.map(function(c){return parseAIScore(c.ai_analysis);}).filter(Boolean);
      var avg = sc.length ? Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length) : 0;
      var pct = avg * 10;
      var fill = pct >= 70 ? 'fill-green' : 'fill-orange';
      var agendou = calls.filter(function(c){return c.result==='Agendou';}).length;
      var atendeu = calls.filter(function(c){return c.result==='Atendeu';}).length;
      var convRate = calls.length ? Math.round((agendou/calls.length)*100) : 0;
      var last = calls[0];
      var lastTime = last && last.started_at ? new Date(last.started_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '—';
      return '<div class="analysis-card">'
        + '<div class="analysis-top"><div class="analysis-name">' + name + '</div>'
        + '<div class="analysis-time">Última: ' + lastTime + ' · ' + todayC.length + ' hoje</div></div>'
        + '<div class="score-bar-wrap"><div class="score-bar-label"><span>Score IA Médio</span><span>' + (avg||'—') + '/10</span></div>'
        + '<div class="score-bar"><div class="score-fill ' + fill + '" style="width:' + pct + '%"></div></div></div>'
        + '<div class="score-bar-wrap"><div class="score-bar-label"><span>Taxa de Agendamento</span><span>' + convRate + '%</span></div>'
        + '<div class="score-bar"><div class="score-fill fill-blue" style="width:' + convRate + '%"></div></div></div>'
        + '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">'
        + '<span class="badge-pill pill-green">✅ ' + atendeu + ' atendeu</span>'
        + '<span class="badge-pill pill-green">📅 ' + agendou + ' agendou</span>'
        + '<span class="badge-pill">' + calls.length + ' total</span>'
        + '</div></div>';
    }).join('');
    perfBody.innerHTML = html;
  }

  function renderCallsList(calls) {
    var panel = document.getElementById('__calls-panel');
    if (!panel) {
      var grid = document.querySelector('#tab-dashboard .grid-2');
      if (!grid) return;
      panel = document.createElement('div');
      panel.id = '__calls-panel';
      panel.className = 'panel';
      panel.innerHTML = '<div class="panel-header"><div class="panel-title">Últimas Ligações</div><div class="panel-badge">AO VIVO</div></div>'
        + '<div id="__calls-list" class="panel-body" style="padding:0 18px;max-height:300px;overflow-y:auto"></div>';
      grid.insertAdjacentElement('afterend', panel);
    }
    var listEl = document.getElementById('__calls-list');
    if (!listEl || !calls.length) return;
    var rc = { 'Agendou':'var(--accent)', 'Atendeu':'var(--ms)', 'Não atendeu':'var(--warn)', 'Desqualificado':'var(--danger)' };
    listEl.innerHTML = calls.map(function(c) {
      var score = parseAIScore(c.ai_analysis);
      var time = c.started_at ? new Date(c.started_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
      var dur = c.duration_seconds ? Math.floor(c.duration_seconds/60)+':'+String(c.duration_seconds%60).padStart(2,'0') : '—';
      var initials = (c.lead_name||'L').split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
      var rColor = rc[c.result] || 'var(--muted)';
      return '<div class="call-item">'
        + '<div class="call-avatar" style="background:linear-gradient(135deg,#0066ff,#00b4d8)">' + initials + '</div>'
        + '<div class="call-info">'
        + '<div class="call-top"><div class="call-name">' + (c.lead_name||'Lead') + ' <span style="font-size:10px;font-weight:400;color:var(--muted)">· ' + (c.sdr_name||'') + '</span></div>'
        + '<div class="call-time">' + time + ' · ⏱ ' + dur + '</div></div>'
        + '<div class="call-meta">' + (c.phone||'') + '</div>'
        + '<div class="call-tags"><span class="tag" style="background:rgba(0,0,0,.3);color:' + rColor + ';border:1px solid ' + rColor + '40">' + (c.result||'—') + '</span>'
        + (score ? '<span class="tag tag-ok">IA: ' + score + '/10</span>' : '')
        + '</div></div></div>';
    }).join('');
  }

  function renderAnalysisHistory(calls) {
    var hist = document.getElementById('analysisHistory');
    if (!hist || !calls.length) return;
    hist.innerHTML = calls.map(function(c) {
      var score = parseAIScore(c.ai_analysis);
      var pct = score ? score * 10 : 0;
      var color = pct >= 70 ? 'fill-green' : 'fill-orange';
      var time = c.started_at ? new Date(c.started_at).toLocaleString('pt-BR') : '—';
      var summary = (c.ai_analysis||'').split('\n').filter(function(l){return l.trim();}).slice(0,2).join(' · ');
      return '<div class="analysis-card">'
        + '<div class="analysis-top"><div class="analysis-name">' + (c.lead_name||'Lead') + ' <span style="font-size:10px;color:var(--muted)">· ' + (c.sdr_name||'') + '</span></div>'
        + '<div class="analysis-time">' + time + '</div></div>'
        + '<div class="score-bar-wrap"><div class="score-bar-label"><span>Score IA</span><span>' + (score ? score+'/10' : '—') + '</span></div>'
        + '<div class="score-bar"><div class="score-fill ' + color + '" style="width:' + pct + '%"></div></div></div>'
        + '<div style="font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5">' + summary.substring(0,120) + '</div>'
        + '<div style="margin-top:5px;font-family:var(--mono);font-size:9px;color:' + (c.result==='Agendou'?'var(--accent)':'var(--muted)') + '">'
        + (c.result||'—') + ' · ⏱ ' + (c.duration_seconds ? Math.floor(c.duration_seconds/60)+'min' : '—') + '</div>'
        + '</div>';
    }).join('');
  }

  // Expõe filterCallsBySDR no window com nome de patch para não colidir
  window.patchFilterSDR = async function(sdrName) {
    try {
      var calls = await sbFetch('ligacoes?sdr_name=eq.' + encodeURIComponent(sdrName) + '&select=*&order=created_at.desc&limit=50');
      if (Array.isArray(calls)) {
        renderCallsList(calls.slice(0,10));
        renderAnalysisHistory(calls.slice(0,20));
      }
    } catch(e) { console.warn('[patchFilterSDR]', e); }
  };

  // ================================================================
  // INIT PATCH — usa DOMContentLoaded, NÃO sobrescreve window.onload
  // Isso garante que os event listeners do HTML original funcionem
  // ================================================================
  document.addEventListener('DOMContentLoaded', function() {
    // Aguarda 800ms para o init original do sdr-command.html terminar
    setTimeout(function() {
      loadLigacoesData();
      setInterval(loadLigacoesData, 30000);
    }, 800);
  });

})(); // fim do IIFE — nenhuma variável vaza para o escopo global
</script>
